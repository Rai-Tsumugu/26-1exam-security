<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>模擬試験 第3回 ― 組織・総合編（自動採点）</title>
<style>
body{font-family:'Hiragino Kaku Gothic Pro','Yu Gothic',Meiryo,sans-serif;background:#f4f7fb;margin:0;padding:20px;color:#222;line-height:1.7;}
.page{max-width:920px;margin:auto;background:white;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1);padding:40px;}
.header{background:linear-gradient(135deg,#455a64,#263238);color:white;border-radius:8px;padding:24px 30px;margin-bottom:24px;}
.header h1{margin:0;font-size:0.95em;opacity:0.85;letter-spacing:2px;}
.header h2{margin:8px 0 0;font-size:1.6em;}
.meta{background:#eceff1;border-left:5px solid #5e35b1;padding:12px 18px;margin-bottom:24px;border-radius:4px;font-size:0.92em;}
.q{background:#fafafa;border:1px solid #e0e0e0;border-radius:8px;padding:18px 22px;margin-bottom:16px;}
.q.correct{border-color:#43a047;background:#e8f5e9;}
.q.wrong{border-color:#e53935;background:#ffebee;}
.q-head{font-weight:bold;color:#263238;margin-bottom:8px;display:flex;align-items:center;}
.q-tag{display:inline-block;background:#5e35b1;color:white;font-size:0.78em;padding:2px 10px;border-radius:10px;margin-right:8px;}
.q-mark{margin-left:auto;font-size:1.4em;font-weight:bold;}
.opt{display:block;margin:4px 0;padding:4px 8px;border-radius:4px;cursor:pointer;}
.opt:hover{background:#eee;}
.opt input{margin-right:8px;}
input[type="text"]{padding:6px 10px;border:1px solid #999;border-radius:4px;font-size:1em;width:280px;font-family:inherit;}
.review{margin-top:12px;padding:12px 16px;background:#fff;border-radius:6px;border-left:4px solid #5e35b1;display:none;font-size:0.93em;}
.review.show{display:block;}
.review h4{margin:6px 0 4px;color:#5e35b1;font-size:0.95em;}
.review .label{display:inline-block;background:#5e35b1;color:white;padding:1px 8px;border-radius:8px;font-size:0.78em;margin-right:6px;}
.controls{position:sticky;bottom:20px;background:white;padding:16px;border-radius:8px;box-shadow:0 -2px 12px rgba(0,0,0,0.08);text-align:center;margin-top:20px;border:1px solid #ddd;}
.controls button{font-size:1em;padding:10px 26px;margin:0 8px;border:none;border-radius:6px;cursor:pointer;color:white;font-weight:bold;font-family:inherit;}
.btn-grade{background:#43a047;}
.btn-reset{background:#fb8c00;}
.btn-review{background:#1976d2;display:none;}
.score-panel{display:none;background:linear-gradient(135deg,#5e35b1,#311b92);color:white;border-radius:8px;padding:24px 30px;margin:20px 0;text-align:center;}
.score-panel.show{display:block;}
.score-panel .score{font-size:3em;font-weight:bold;margin:10px 0;}
.nav{margin-top:24px;text-align:center;font-size:0.9em;}
.nav a{color:#455a64;margin:0 12px;}
@media print { .controls{display:none;} .review{display:block;} }
</style>
</head>
<body>
<div class="page">
<div class="header"><h1>インターネットセキュリティ 模擬試験 ― 自動採点版</h1><h2>第3回 ― 組織・総合編（全20問）</h2></div>
<div class="meta">📘 出題範囲：第6〜7回中心＋全範囲（リスクマネジメント・ポリシー・物理セキュリティ・総合）<br>
🕒 制限時間：45分　/　💯 配点：各5点（合計100点）<br>
🖱️ 採点後、各問の <b>模範解答／設問意図／解説</b> が表示されます。</div>

<div id="score-panel" class="score-panel">
  <div>あなたのスコア</div>
  <div class="score"><span id="score">0</span> / 100 点</div>
  <div>正答数：<span id="correct-count">0</span> / 20問</div>
  <div class="comment" id="comment"></div>
</div>

<div id="quiz"></div>

<div class="controls">
  <button class="btn-grade" onclick="grade()">🎯 採点する</button>
  <button class="btn-review" id="btn-review" onclick="toggleReview()">📖 振り返り表示/非表示</button>
  <button class="btn-reset" onclick="reset()">🔄 リセット</button>
</div>

<div class="nav"><a href="../00_overview.html">▶ 全体マップへ戻る</a></div>
</div>

<script>
const REF = {
  oc:{url:'../04_organizational_security_management.html#concepts', label:'📗 資料④「組織のセキュリティ管理」へ'},
  ot:{url:'../04_organizational_security_management.html#terms', label:'📗 資料④「キーワード辞典」へ'},
  or:{url:'../04_organizational_security_management.html#relations', label:'📗 資料④「関係図・比較」へ'},
  ok:{url:'../04_organizational_security_management.html#checkpoint', label:'📗 資料④「確認ポイント」へ'},
};
const refMap = {
  1:'oc', 2:'ot', 3:'oc', 4:'or', 5:'oc', 6:'oc', 7:'ot', 8:'oc', 9:'ot', 10:'oc',
  11:'ot', 12:'oc', 13:'oc', 14:'oc', 15:'oc', 16:'oc', 17:'oc', 18:'oc', 19:'or', 20:'oc'
};
const questions = [
  {id:1, type:'radio', tag:'四択(該当しない)',
    text:'リスクマネジメントの4方針として「該当しない」ものはどれか。',
    options:['A. リスク低減','B. リスク回避','C. リスク隠蔽','D. リスク転嫁'],
    answer:'C',
    intent:'4方針＋ダミーから不適切な選択肢を見抜けるか。',
    explanation:'4方針は 低減・回避・保有(受容)・転嫁。「隠蔽」は不適切な対応であり方針ではない。'},
  {id:2, type:'text', tag:'穴埋め',
    text:'事故・災害時にも重要事業を継続させる計画を「事業継続計画」と呼び、英語の略称で（　？　）と表記する（アルファベット3字）。',
    answer:['BCP','bcp'],
    intent:'BCP の略称を答えられるか。',
    explanation:'Business Continuity Plan。リスクマネジメントの主要メリットの一つ。'},
  {id:3, type:'radio', tag:'○×',
    text:'物理セキュリティ対策では、機器の保護よりも人命救助が最優先である。',
    options:['○（正しい）','×（誤り）'],
    answer:'○（正しい）',
    intent:'物理セキュリティの大原則を理解。',
    explanation:'講義で「何よりも人命救助が第一優先」と明示。'},
  {id:4, type:'radio', tag:'事例分類',
    text:'「クラウド導入をリスクの高さから取りやめた」事例はどの方針か。',
    options:['A. リスク低減','B. リスク回避','C. リスク保有','D. リスク転嫁'],
    answer:'B',
    intent:'活動自体をやめる＝回避と判別。',
    explanation:'リスクの原因となる活動を取りやめる対応＝リスク回避。'},
  {id:5, type:'checkbox', tag:'複数選択',
    text:'物理セキュリティの4つの脅威分類として講義で挙げられているものをすべて選びなさい。',
    options:['A. 不正侵入','B. 機器の盗難','C. ソフトウェア脆弱性','D. 内部犯行','E. 自然災害'],
    answer:['A','B','D','E'],
    intent:'論理 vs 物理 の区別。',
    explanation:'Cは論理（情報システム）の脆弱性で物理ではない。'},
  {id:6, type:'text', tag:'穴埋め',
    text:'不正のトライアングルの3要素は「機会」「動機」「（　？　）」である。',
    answer:['正当化'],
    intent:'残りの要素を答えられるか。',
    explanation:'例：「業務効率化のため」など、自らを納得させる理由付け。'},
  {id:7, type:'radio', tag:'用語選択',
    text:'ノートPCを机に物理的に固定して盗難を防ぐ器具はどれか。',
    options:['A. セキュリティワイヤー','B. ICカードリーダー','C. UPS（無停電電源装置）','D. ファイアウォール'],
    answer:'A',
    intent:'物理対策の代表器具の識別。',
    explanation:'Bは入退室管理、Cは停電対策、Dはネットワーク防御。'},
  {id:8, type:'radio', tag:'四択',
    text:'情報セキュリティポリシーの3階層構造で<strong>最上位</strong>に位置する文書はどれか。',
    options:['A. 実施手順書','B. 運用手順書','C. 情報セキュリティ対策基準','D. 情報セキュリティ基本方針'],
    answer:'D',
    intent:'3階層構造を理解（基本方針 → 対策基準 → 手順書）。',
    explanation:'最上位は基本方針。組織の意思を示す抽象度の高い文書。'},
  {id:9, type:'radio', tag:'○×',
    text:'リスク保有（受容）とは、特別な対策を講じずリスクをそのまま受け入れる方針であり、発生確率が低く対策費用が高い場合に選択される。',
    options:['○（正しい）','×（誤り）'],
    answer:'○（正しい）',
    intent:'費用対効果の考え方を理解。',
    explanation:'対策コストがリスク額を上回るときに選択される。'},
  {id:10, type:'radio', tag:'用語選択',
    text:'不正のトライアングルの「機会」の例として最も適切なものはどれか。',
    options:['A. 会社への恨み','B. 業務効率化のため','C. 1人に依存した業務、鍵のない金庫','D. 他者への私刑目的'],
    answer:'C',
    intent:'機会＝環境的要因の識別。',
    explanation:'A=動機、B・D=正当化、C=機会。実行が容易な環境・状況。'},
  {id:11, type:'text', tag:'穴埋め',
    text:'災害復旧（Disaster Recovery）の英語の略称は（　？　）である（アルファベット2字）。',
    answer:['DR','dr'],
    intent:'DR の略称を答えられるか。',
    explanation:'災害後のシステム復旧、被害最小化の予防措置。BCPと共に語られる。'},
  {id:12, type:'checkbox', tag:'複数選択',
    text:'情報リスクの「自然災害」に該当するものをすべて選びなさい。',
    options:['A. 火災','B. 地震','C. サイバー攻撃','D. 噴火','E. 内部犯行','F. 風水害'],
    answer:['A','B','D','F'],
    intent:'自然災害と人的災害の区別。',
    explanation:'C・E は人的災害。火災は自然災害に含めるのが講義の分類。'},
  {id:13, type:'radio', tag:'四択',
    text:'内部犯行への対策として最も適切なものはどれか。',
    options:['A. アクセス権限を全員に開放する','B. 必要な人だけが機密情報に触れられるよう権限を制御する','C. 監視カメラをすべて撤去する','D. パスワードを共有する'],
    answer:'B',
    intent:'最小権限の原則を理解しているか。',
    explanation:'「必要な人だけ」が機密に触れられる制御＋監視カメラで抑止が基本。'},
  {id:14, type:'radio', tag:'用語選択',
    text:'入退室管理に使用される認証方法として<strong>不適切</strong>なものはどれか。',
    options:['A. ICカード','B. 生体認証（指紋・静脈）','C. 口頭での挨拶のみ','D. パスコード入力'],
    answer:'C',
    intent:'物理的に確実な認証手段か判別できるか。',
    explanation:'口頭挨拶は本人確認になっておらず、なりすましを許す。'},
  {id:15, type:'text', tag:'穴埋め',
    text:'リスクマネジメントの基本アプローチは（　？　）サイクル（Plan→Do→Check→Action）に従う（アルファベット4字）。',
    answer:['PDCA','pdca'],
    intent:'PDCAサイクルを覚えているか。',
    explanation:'リスク洗い出し→分析評価→処理手段策定（Plan）→実施（Do）→モニタリング（Check）→改善（Action）。'},
  {id:16, type:'radio', tag:'四択',
    text:'リスクの分析・評価の際に作成する、発生頻度と影響度の2軸で図示するものを何と呼ぶか。',
    options:['A. リスクマップ','B. ベン図','C. キルチェーン','D. リング図'],
    answer:'A',
    intent:'リスクマップ の用語を知っているか。',
    explanation:'縦軸：影響度、横軸：発生頻度の2軸マトリクスでリスクを可視化。'},
  {id:17, type:'radio', tag:'○×',
    text:'ファイアウォール（FW）は物理セキュリティ対策の一つに含まれる。',
    options:['○（正しい）','×（誤り）'],
    answer:'×（誤り）',
    intent:'論理と物理を区別できているか。',
    explanation:'FW は論理（ネットワーク）セキュリティ。物理セキュリティはサーバ・PC の物理的脅威対策。'},
  {id:18, type:'radio', tag:'四択',
    text:'機器盗難への対策として「データを暗号化する」目的として最も適切なものはどれか。',
    options:['A. 機器を物理的に守るため','B. 盗まれてもデータの中身を読まれないようにし二次被害を低減するため','C. ファイルを軽くするため','D. 通信を高速化するため'],
    answer:'B',
    intent:'暗号化の目的を理解しているか。',
    explanation:'盗難を完全には防げないため、盗難後の被害を最小化する手段として暗号化する。'},
  {id:19, type:'radio', tag:'事例分類',
    text:'「サイバー保険に加入することにした」事例はどのリスクマネジメント方針に該当するか。',
    options:['A. リスク低減','B. リスク回避','C. リスク保有','D. リスク転嫁'],
    answer:'D',
    intent:'保険＝転嫁の判別。',
    explanation:'保険でリスクを他者（保険会社）に移すため転嫁。'},
  {id:20, type:'radio', tag:'四択',
    text:'総務省による「情報セキュリティポリシー」の定義として最も適切なものはどれか。',
    options:['A. 暗号化アルゴリズムの規格','B. 個人の倫理規範','C. 企業や組織における情報セキュリティ対策の方針や行動指針','D. ネットワーク機器の設定ファイル'],
    answer:'C',
    intent:'ポリシーの公式定義を理解しているか。',
    explanation:'総務省定義：「企業や組織における情報セキュリティ対策の方針や行動指針」。'}
];

const quiz = document.getElementById('quiz');
function renderQuiz(){
  quiz.innerHTML = questions.map(q => {
    let body='';
    if(q.type==='radio') body = q.options.map(o=>`<label class="opt"><input type="radio" name="q${q.id}" value="${o.split('.')[0].trim()}"> ${o}</label>`).join('');
    else if(q.type==='checkbox') body = q.options.map(o=>`<label class="opt"><input type="checkbox" name="q${q.id}" value="${o.split('.')[0].trim()}"> ${o}</label>`).join('');
    else body = `<input type="text" id="q${q.id}" placeholder="回答を入力">`;
    return `<div class="q" id="qbox${q.id}">
      <div class="q-head"><span class="q-tag">Q${q.id} ${q.tag}</span><span class="q-mark" id="mark${q.id}"></span></div>
      <div class="q-body">${q.text}</div>${body}
      <div class="review" id="review${q.id}">
        <h4><span class="label">模範解答</span>${formatAnswer(q)}</h4>
        <h4><span class="label" style="background:#00acc1;">設問意図</span></h4><div>${q.intent}</div>
        <h4><span class="label" style="background:#43a047;">解説</span></h4><div>${q.explanation}</div>
        ${refMap[q.id] ? `<div style="margin-top:10px;"><a href="${REF[refMap[q.id]].url}" target="_blank" style="display:inline-block;background:#5e35b1;color:white;padding:6px 14px;border-radius:6px;text-decoration:none;font-size:0.88em;">${REF[refMap[q.id]].label} 🔗</a></div>` : ''}
      </div></div>`;
  }).join('');
}
function formatAnswer(q){
  if(q.type==='text') return q.answer[0];
  if(q.type==='checkbox') return q.answer.join('・');
  return q.answer;
}
function getUserAnswer(q){
  if(q.type==='radio'){const s=document.querySelector(`input[name="q${q.id}"]:checked`);return s?s.value:null;}
  if(q.type==='checkbox') return Array.from(document.querySelectorAll(`input[name="q${q.id}"]:checked`)).map(e=>e.value).sort();
  return document.getElementById(`q${q.id}`).value.trim();
}
function isCorrect(q,user){
  if(user===null||user===''||(Array.isArray(user)&&user.length===0)) return false;
  if(q.type==='text') return q.answer.some(a=>user===a||user.toLowerCase()===a.toLowerCase());
  if(q.type==='checkbox') return JSON.stringify(user)===JSON.stringify([...q.answer].sort());
  return user===q.answer;
}
function grade(){
  let c=0;
  questions.forEach(q=>{
    const u=getUserAnswer(q);const ok=isCorrect(q,u);
    const box=document.getElementById(`qbox${q.id}`),mark=document.getElementById(`mark${q.id}`),rev=document.getElementById(`review${q.id}`);
    box.classList.remove('correct','wrong');
    if(ok){box.classList.add('correct');mark.textContent='✓';mark.style.color='#2e7d32';c++;}
    else{box.classList.add('wrong');mark.textContent='✗';mark.style.color='#c62828';}
    rev.classList.add('show');
  });
  const s=c*5;
  document.getElementById('score').textContent=s;
  document.getElementById('correct-count').textContent=c;
  let cm='';
  if(s===100) cm='🏆 満点！組織管理視点まで完璧です。';
  else if(s>=80) cm='🎉 総合力十分。本試験に自信を持って臨めます。';
  else if(s>=60) cm='📘 概ね理解。事例分類問題を中心に復習を。';
  else cm='📚 解説資料「④ 組織のセキュリティ管理」を再読してください。';
  document.getElementById('comment').textContent=cm;
  document.getElementById('score-panel').classList.add('show');
  document.getElementById('btn-review').style.display='inline-block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function toggleReview(){document.querySelectorAll('.review').forEach(r=>r.classList.toggle('show'));}
function reset(){if(!confirm('全ての回答をリセットしますか？')) return;renderQuiz();document.getElementById('score-panel').classList.remove('show');document.getElementById('btn-review').style.display='none';window.scrollTo({top:0,behavior:'smooth'});}
renderQuiz();
</script>
</body>
</html>
