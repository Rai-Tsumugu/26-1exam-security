<div class="q"><div class="q-head"><span class="q-tag">Q1</span>穴埋め（CIA）</div>
<div class="ans"><b>完全性（Integrity）</b></div>
<div class="exp">情報セキュリティ三大要素は C(機密性) / I(完全性) / A(可用性)。完全性は「改ざんや破壊から守る」性質。</div></div>

<div class="q"><div class="q-head"><span class="q-tag">Q2</span>四択（有形資産）</div>
<div class="ans"><b>C. サーバやパソコン等のハードウェア</b></div>
<div class="exp">有形資産＝文書、CD/DVD等の記録媒体、ハードウェア、ネットワーク機器。A・B・D はソフトウェアやデータで「無形資産」。</div></div>
